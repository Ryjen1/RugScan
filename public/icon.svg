<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-label="Shrewd Guard">
  <title>Shrewd Guard</title>
  <defs>
    <linearGradient id="sgi-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#07090d"/>
    </linearGradient>
    <linearGradient id="sgi-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb68b"/>
      <stop offset="100%" stop-color="#2a8c69"/>
    </linearGradient>
    <linearGradient id="sgi-scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#3fb68b" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3fb68b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3fb68b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded backdrop so the icon survives both light and dark UIs -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#sgi-bg)"/>

  <!-- Shield -->
  <path
    d="M32 8 L52 14 L55 30 Q55 47 32 56 Q9 47 9 30 L12 14 Z"
    fill="url(#sgi-shield)"
    stroke="#3fb68b"
    stroke-width="1.25"
    stroke-linejoin="round"
  />

  <!-- Eye almond -->
  <path
    d="M16 32 Q32 18 48 32 Q32 46 16 32 Z"
    fill="#07090d"
  />

  <!-- Iris -->
  <circle cx="32" cy="32" r="7.5" fill="#0d1117" stroke="#3fb68b" stroke-width="1"/>

  <!-- Pupil (token diamond) -->
  <path d="M32 28.5 L35.5 32 L32 35.5 L28.5 32 Z" fill="#3fb68b"/>

  <!-- Catchlight -->
  <circle cx="29.5" cy="30" r="1" fill="#e6edf3" opacity="0.85"/>

  <!-- Scan line -->
  <rect x="16" y="31.4" width="32" height="1.2" fill="url(#sgi-scan)" opacity="0.9"/>
</svg>
